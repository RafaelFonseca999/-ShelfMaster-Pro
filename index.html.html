<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShelfMaster Pro - Inventory Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation (hidden initially) -->
        <nav class="sidebar" id="sidebar" style="display: none;">
            <div class="sidebar-header">
                <i class="fas fa-archive"></i>
                <h2>ShelfMaster Pro</h2>
            </div>
            
            <div class="sidebar-menu">
                <a href="#dashboard" class="menu-item active">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#items" class="menu-item">
                    <i class="fas fa-box"></i>
                    <span>Items</span>
                </a>
                <a href="#locations" class="menu-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Locations</span>
                </a>
                <a href="#categories" class="menu-item">
                    <i class="fas fa-tags"></i>
                    <span>Categories</span>
                </a>
                <a href="#movements" class="menu-item">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Movements</span>
                </a>
                <a href="#reports" class="menu-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="user-info" id="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <span class="user-name" id="user-name">Loading...</span>
                        <span class="user-role" id="user-role">Loading...</span>
                    </div>
                </div>
                <button class="logout-btn" id="logout-btn" style="display: none;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <!-- Auth Screen (visible by default) -->
            <div id="auth-screen" class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <i class="fas fa-archive"></i>
                        <h2>ShelfMaster Pro</h2>
                        <p>Inventory Management System</p>
                    </div>
                    
                    <div class="auth-tabs">
                        <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                        <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
                    </div>

                    <form id="login-form" class="auth-form active">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" id="login-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" class="form-control" id="login-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                    </form>

                    <form id="register-form" class="auth-form">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" class="form-control" id="register-name" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" id="register-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" class="form-control" id="register-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Register</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Load scripts in correct order -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
